<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Format Flow Bridge</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #121212;
        background: #ffffff;
        font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      p,
      li {
        color: #555;
        font-size: 13px;
        line-height: 1.5;
      }
      code {
        color: #165dff;
      }
    </style>
  </head>
  <body>
    <h1>Format Flow Bridge</h1>
    <p>打开一个支持的 AI 网页，再在 Format Flow 的顺序运行中选择“浏览器插件连接”。</p>
    <p>插件只填入输入框，不自动点击发送，保留人工审查。</p>
    <p>支持：ChatGPT、Claude、Gemini、DeepSeek、Kimi、Qwen、Perplexity、Poe、Grok。</p>
  </body>
</html>
