<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Format Flow Feature Showcase</title>
  <style>
    :root{--bg:#f7f5ef;--panel:rgba(255,255,255,.96);--text:#121212;--muted:#5f625b;--line:rgba(18,18,18,.14);--accent:#165dff;--accent2:#0b8f6f;--soft:#eaf0ff;--danger:#c83221;--shadow:0 24px 80px rgba(31,35,28,.12);font-family:"Aptos Display","Segoe UI Variable","Microsoft YaHei UI",sans-serif;color:var(--text);background:var(--bg)}
    *{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden}body{background:radial-gradient(circle at 10% 10%,rgba(22,93,255,.12),transparent 28%),radial-gradient(circle at 88% 18%,rgba(11,143,111,.10),transparent 24%),linear-gradient(135deg,#fbfaf6 0%,#f1efe7 52%,#fff 100%)}
    .shell{display:grid;grid-template-columns:286px 1fr;height:100vh;padding:18px;gap:18px}.sidebar,.panel{border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow);backdrop-filter:blur(20px)}.sidebar{display:grid;grid-template-rows:auto 1fr auto;overflow:hidden;border-radius:30px;padding:18px}
    .brand{display:flex;align-items:center;gap:12px;padding:6px 6px 20px}.brand strong{display:block;font-size:19px}.muted,.brand span,.panel-header p,.hint{color:var(--muted);font-size:12px}.brand-mark{display:grid;width:44px;height:44px;place-items:center;color:#fff;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px}
    .tabs{display:grid;align-content:start;gap:10px}.tab{display:grid;gap:3px;text-align:left;border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px}.tab strong{font-size:15px}.tab small{color:var(--muted)}.tab.active{color:#fff;background:var(--accent);border-color:var(--accent)}.tab.active small{color:rgba(255,255,255,.78)}
    .sidebar-footer{display:flex;gap:8px;align-items:center;min-height:38px;padding:0 8px;color:var(--muted);font-size:12px}.dot{width:9px;height:9px;border-radius:50%;background:var(--accent2)}
    .panel{height:calc(100vh - 36px);border-radius:30px;overflow:hidden}.panel-header h2{margin:0;font-size:28px;letter-spacing:-.03em}.panel-header p{margin:6px 0 0}.pill{display:inline-flex;width:fit-content;border:1px solid rgba(22,93,255,.22);color:var(--accent);background:var(--soft);border-radius:999px;padding:5px 8px;font-size:11px}.green{color:var(--accent2);background:#e9f8f2;border-color:rgba(11,143,111,.22)}
    .btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;font-weight:700}.primary{color:#fff;background:var(--accent);border-color:var(--accent)}.danger{color:var(--danger);border-color:rgba(200,50,33,.3)}.grid{display:grid;gap:14px}.card{display:grid;gap:10px;padding:15px;border:1px solid var(--line);border-radius:20px;background:#fff}.card h3{margin:0;font-size:17px}.card p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.input,.textarea,.select{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;padding:11px 12px;color:var(--text)}.textarea{min-height:120px;font-family:"Cascadia Code","JetBrains Mono",monospace;font-size:12px;line-height:1.5;white-space:pre-wrap}code{font-family:"Cascadia Code","JetBrains Mono",monospace;font-size:12px;color:#333}
    .library{display:grid;grid-template-columns:300px 1fr}.library-side,.main{min-height:0;padding:22px}.library-side{display:grid;align-content:start;gap:12px;overflow:hidden;border-right:1px solid var(--line)}.main{display:grid;grid-template-rows:auto auto auto 1fr;gap:14px;overflow:hidden}.category{display:flex;justify-content:space-between;align-items:center;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;font-weight:700}.category.active{color:#fff;background:var(--accent);border-color:var(--accent)}.tiles{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;overflow:hidden}.search{display:grid;grid-template-columns:1fr 220px auto;gap:12px;align-items:end}
    .two{display:grid;grid-template-columns:360px 1fr}.left,.right{padding:22px;min-height:0}.left{border-right:1px solid var(--line);display:grid;align-content:start;gap:14px}.right{display:grid;gap:14px;overflow:hidden}.workflow{display:grid;grid-template-rows:auto 1fr}.workflow-toolbar{display:grid;grid-template-columns:1fr 580px;gap:16px;padding:22px;border-bottom:1px solid var(--line)}.workflow-main{display:grid;grid-template-columns:1fr 360px;min-height:0}.canvas{position:relative;background:linear-gradient(rgba(22,93,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(22,93,255,.06) 1px,transparent 1px);background-size:42px 42px}.node{position:absolute;width:150px;display:grid;gap:8px;padding:14px;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:0 14px 42px rgba(31,35,28,.10)}.node span{color:var(--muted);font-size:12px;line-height:1.35}.edge{position:absolute;height:2px;background:var(--accent);transform-origin:left center}.edge:after{content:"";position:absolute;right:-2px;top:-4px;border-left:8px solid var(--accent);border-top:5px solid transparent;border-bottom:5px solid transparent}.inspector{padding:22px;border-left:1px solid var(--line);display:grid;align-content:start;gap:14px}
    .steps{display:grid;gap:8px}.step{display:grid;grid-template-columns:28px 1fr auto;gap:9px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:14px;background:#fff}.step.active{background:var(--soft);border-color:rgba(22,93,255,.45)}.step b{display:grid;width:24px;height:24px;place-items:center;border-radius:50%;color:#fff;background:var(--accent);font-size:12px}.status-card{display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:center;padding:12px;border:1px solid rgba(24,129,71,.25);border-radius:18px;background:#edf8f1}.ai{display:grid;width:38px;height:38px;place-items:center;color:#fff;background:var(--accent2);border-radius:14px;font-weight:900}.settings{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;padding:20px}.settings .card{border-radius:24px;align-content:start;gap:8px;padding:13px}.dir-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:8px;border:1px solid var(--line);border-radius:12px;background:#fff}.learning{display:grid;grid-template-columns:300px 420px 1fr}.mcp{display:grid;grid-template-columns:390px 1fr}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const tabs=[["prompts","提示词","分类、搜索、复制和导入"],["skills","Skills","扫描、安装和索引 Skill"],["workflows","工作流","编排 Prompt、Skill 和审查节点"],["runner","顺序运行","审查后自动发送下一步任务"],["mcps","MCP","导入和维护服务配置"],["learning","学习","从满意样本生成 Skill"],["settings","设置","快捷键、目录和备份"]];
    const view=new URLSearchParams(location.search).get("view")||"prompts";
    const h=(t,d)=>`<div class="panel-header"><h2>${t}</h2><p>${d}</p></div>`;
    const chips=a=>`<div class="row">${a.map(x=>`<span class="pill">${x}</span>`).join("")}</div>`;
    const shell=c=>`<div class="shell"><aside class="sidebar"><div class="brand"><div class="brand-mark">FF</div><div><strong>Format Flow</strong><span>Prompt + Skill 工作台</span></div></div><nav class="tabs">${tabs.map(([id,l,d])=>`<div class="tab ${id===view?"active":""}"><strong>${l}</strong><small>${d}</small></div>`).join("")}</nav><div class="sidebar-footer"><span class="dot"></span><span>演示数据已载入：3 个提示词、2 个 Skill、1 条工作流</span></div></aside><main>${c}</main></div>`;
    function prompts(){let cards=[["Release 发布说明生成","把提交记录、验证命令和安装包路径整理成可发布说明。",["release","github","docs"]],["安装器问题诊断","定位安装包关闭旧应用、卸载旧版本和覆盖安装失败。",["installer","windows","debug"]],["Skill 手动整理","把散乱经验整理成可复用的 Codex Skill。",["skill","codex","learning"]]];return `<section class="panel library"><div class="library-side">${h("提示词分组","分组可排序，也可建立小类")}<div class="category active"><span>全部提示词</span><b>3</b></div><div class="category"><span>Release</span><b>1</b></div><div class="category"><span>Installer</span><b>1</b></div><div class="category"><span>Learning</span><b>1</b></div><button class="btn">添加分组</button></div><div class="main">${h("提示词管理","3 / 3 个模板")}<div class="search"><input class="input" value="安装包 release"><div class="category">当前分组：全部提示词</div><button class="btn primary">新建提示词</button></div><div class="row"><button class="btn">从备份恢复</button><button class="btn">导入已有</button><input class="input" value="codex prompt"><button class="btn">从 GitHub 发现 Prompt</button></div><div class="tiles">${cards.map(([t,d,tg])=>`<article class="card"><h3>${t}</h3><p>${d}</p>${chips(tg)}<div class="row"><button class="btn primary">编辑</button><button class="btn">复制</button></div></article>`).join("")}</div></div></section>`}
    function skills(){let cards=[["Installer Debug","诊断 Electron/NSIS 安装、覆盖升级、关闭旧应用和 Release 资产问题。",["installer","windows","release"],"D:/codex/format-flow/skills/manual/installer-debug/SKILL.md"],["Release Checklist","发布前执行构建、测试、安装包校验、GitHub Release 上传和下载验证。",["github","release","qa"],"C:/Users/admin/.codex/skills/release-checklist/SKILL.md"]];return `<section class="panel library"><div class="library-side">${h("Skill 来源","扫描本地目录并维护元数据")}<div class="category active"><span>全部 Skill</span><b>2</b></div><div class="category"><span>自定义</span><b>1</b></div><div class="category"><span>Codex</span><b>1</b></div><button class="btn primary">重新扫描</button></div><div class="main">${h("Skill 管理","2 / 2 个 Skill")}<div class="row"><button class="btn">从备份恢复</button><button class="btn">安装 ZIP</button><button class="btn">导入已有</button><input class="input" value="electron installer skill"><button class="btn">从 GitHub 发现 Skill</button></div><div class="tiles">${cards.map(([t,d,tg,p])=>`<article class="card"><h3>${t}</h3><p>${d}</p>${chips(tg)}<code>${p}</code><div class="row"><button class="btn primary">编辑索引</button><button class="btn">打开目录</button></div></article>`).join("")}</div></div></section>`}
    function workflows(){return `<section class="panel workflow"><div class="workflow-toolbar">${h("工作流编排","提示词节点可选择调用哪个 Skill")}<div class="grid"><div class="search"><input class="input" value="安装包发布工作流"><select class="select"><option>Release 发布说明生成</option></select><button class="btn primary">添加节点</button></div><div class="row"><button class="btn">添加人工审查</button><button class="btn primary">新建工作流</button>${chips(["release","installer"])}</div></div></div><div class="workflow-main"><div class="canvas"><div class="edge" style="left:188px;top:188px;width:42px"></div><div class="edge" style="left:378px;top:188px;width:42px"></div><div class="node" style="left:40px;top:118px"><span class="pill">Prompt</span><strong>生成发布说明</strong><span>整理版本亮点和下载说明</span></div><div class="node" style="left:230px;top:118px"><span class="pill green">Skill</span><strong>安装验证 Skill</strong><span>静默安装、覆盖安装和哈希校验</span></div><div class="node" style="left:420px;top:118px"><span class="pill">Review</span><strong>人工确认</strong><span>确认 Release 资产和下载地址正确</span></div></div><aside class="inspector">${h("节点检查器","查看节点输入、输出和审查要求")}<div class="steps"><div class="step active"><b>1</b><strong>生成发布说明</strong><small>prompt</small></div><div class="step"><b>2</b><strong>安装验证 Skill</strong><small>skill</small></div><div class="step"><b>3</b><strong>人工确认</strong><small>approval</small></div></div><textarea class="textarea">输出变量：release-notes\n下一步输入：安装验证摘要</textarea></aside></div></section>`}
    function runner(){return `<section class="panel two"><div class="left">${h("顺序运行","不再手动重复输入提示词；审查后自动生成并发送下一步")}<label>选择工作流<select class="select"><option>安装包发布工作流</option></select></label><label>连接方式<select class="select"><option>浏览器插件连接</option><option>剪贴板连接</option></select></label><div class="status-card"><span class="ai">AI</span><div><strong>已连接 ChatGPT</strong><small>浏览器插件已连接，输出会同步回 Format Flow</small></div><button class="btn">刷新</button></div><button class="btn primary">创建运行记录</button><div class="card"><h3>安装包发布工作流</h3><p>状态：running</p><div class="steps"><div class="step"><b>1</b><strong>生成发布说明</strong><small>done</small></div><div class="step active"><b>2</b><strong>安装验证 Skill</strong><small>running</small></div><div class="step"><b>3</b><strong>人工确认</strong><small>pending</small></div></div></div></div><div class="right">${h("安装验证 Skill","正在验证覆盖安装不会卡在关闭旧应用步骤")}<label>待执行任务<textarea class="textarea">请运行安装器覆盖安装验证。\n\n检查项：\n- npm.cmd run dist\n- FinalUpgradeExitCode=0\n- GitHub Release 资产可下载\n- SHA256 与本地一致</textarea></label><div class="card"><h3>人工审查意见</h3><p>第一轮结果不满意时，在这里继续给已连接 AI 发送修改意见。</p><textarea class="textarea">补充说明 Release 中安装包、blockmap、latest.yml 三个资产都要保留。</textarea></div><label>节点输出<textarea class="textarea">验证通过：安装包可下载、哈希一致、覆盖安装退出码为 0。</textarea></label><div class="row"><button class="btn primary">发送当前任务</button><button class="btn">标记完成并进入下一步</button><button class="btn danger">标记失败</button></div></div></section>`}
    function mcps(){return `<section class="panel mcp"><div class="left">${h("MCP 服务","2 / 2 个配置")}<div class="search"><input class="input" value="github"><button class="btn primary">新增 MCP</button><button class="btn">导入配置</button></div><article class="card"><h3>github-release</h3><p>stdio · manual · enabled</p>${chips(["github","release"])}</article><article class="card"><h3>local-files</h3><p>stdio · imported · enabled</p>${chips(["local","workspace"])}</article></div><div class="right">${h("github-release","维护命令、参数、环境变量和传输方式")}<label>Command<input class="input" value="npx"></label><label>Args<input class="input" value="-y @modelcontextprotocol/server-github"></label><label>Transport<select class="select"><option>stdio</option><option>sse</option><option>http</option></select></label><label>Env<textarea class="textarea">GITHUB_TOKEN=[GITHUB_TOKEN]</textarea></label><div class="row">${chips(["github","release"])}<button class="btn primary">保存 MCP</button><button class="btn danger">删除</button></div></div></section>`}
    function learning(){return `<section class="panel learning"><div class="library-side">${h("学习分组","Hermes 学习样本可按分组管理")}<div class="category active"><span>全部学习样本</span><b>2</b></div><div class="category"><span>满意样本</span><b>1</b></div><div class="category"><span>纠偏样本</span><b>1</b></div><button class="btn">添加分组</button></div><div class="left">${h("Hermes 学习","从满意对话中提炼你的使用习惯，清理隐私后生成可审查 Skill")}<label>学习方式<select class="select"><option>对话审查：学习标记为满意的对话</option><option>钱学森工程控制论：抽象底层逻辑</option></select></label><div class="row"><button class="btn primary">导入 JSON / MD 对话</button><button class="btn">导入顺序运行记录</button></div><div class="row"><span class="pill">样本 2</span><span class="pill green">满意 1</span><span class="pill">纠偏 1</span><span class="pill">隐私替换 3</span></div><article class="card"><h3>安装包发布工作流</h3><p>已验证覆盖安装、Release 下载和 SHA256 校验，适合作为正向样本。</p>${chips(["满意","release","installer"])}</article><article class="card"><h3>安装界面版本号未更新</h3><p>错误样本：不要只改 package.json，还要检查 installer.nsh、构建产物和实际安装界面。</p>${chips(["纠偏","release","installer"])}</article></div><div class="right">${h("Skill 草稿","只使用当前分组中的满意样本；保存前可手动修改内容")}<div class="card"><h3>对话审查学习规则</h3><p>满意对话形成正向策略；不满意对话作为误差信号，生成“不要做什么”和纠偏规则。</p></div><button class="btn primary">生成 Skill 草稿</button><label>Skill 目录名<input class="input" value="release-installer-workflow"></label><label>标题<input class="input" value="Release Installer Workflow"></label><label>SKILL.md 草稿<textarea class="textarea" style="min-height:220px"># Release Installer Workflow\n\nUse when packaging and publishing Format Flow.\n\n## Workflow\n1. Build installer.\n2. Validate upgrade install.\n3. Upload Release assets.\n4. Download and verify SHA256.\n\n## Do Not Do\n- Do not publish before checking installer UI version.\n- Do not leave duplicate Release assets.</textarea></label><div class="row"><button class="btn primary">保存为 Skill</button><button class="btn">丢弃草稿</button></div></div></section>`}
    function settings(){return `<section class="panel settings"><article class="card">${h("全局快捷键","选中捕获框后按键，自动识别组合键")}<div class="category active" style="justify-content:center;min-height:72px">CommandOrControl+Alt+F</div><div class="row"><button class="btn">重新捕获</button><button class="btn primary">保存快捷键</button></div></article><article class="card">${h("Skill 目录","每行一个目录，扫描其中的 SKILL.md")}<div class="dir-row"><code>C:/Users/admin/.codex/skills</code><button class="btn">移除</button></div><div class="dir-row"><code>D:/codex/format-flow/skills/manual</code><button class="btn">移除</button></div><input class="input" value="D:/codex/format-flow/skills/manual"><div class="row"><button class="btn">手动添加</button><button class="btn">恢复默认</button></div><button class="btn primary">保存并扫描目录</button></article><article class="card">${h("数据保存位置","桌面版可选择数据保存目录")}<code>D:/codex/format-flow/data</code><div class="row"><button class="btn">选择目录</button><button class="btn primary">保存位置</button></div></article><article class="card">${h("备份目录","备份提示词、Skill、MCP、分组和工作流")}<code>D:/codex/format-flow/backups</code><div class="row"><button class="btn">选择目录</button><button class="btn primary">立即备份</button></div></article><article class="card">${h("Git 备份","把配置备份推送到远端仓库")}<code>https://github.com/Given-Dream/format-flow.git</code><div class="row"><span class="pill">main</span><button class="btn primary">提交并推送备份</button></div></article><article class="card">${h("本地路径","便于排查安装包和数据问题")}<p><b>Store</b></p><code>D:/codex/format-flow/data/format-flow-store.json</code><p><b>Managed Skills</b></p><code>D:/codex/format-flow/skills/manual</code></article></section>`}
    const views={prompts,skills,workflows,runner,mcps,learning,settings};
    document.getElementById("app").innerHTML=shell((views[view]||prompts)());
  </script>
</body>
</html>
